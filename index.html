<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuídate y mantente bien.</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ── TITLE ── */
    .site-title {
      margin-top: 72px;
      margin-bottom: 64px;
      text-align: center;
      animation: fadeUp 1.4s ease forwards;
      opacity: 0;
      animation-delay: 0.2s;
    }

    .site-title h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.01em;
      color: #fff;
      line-height: 1.3;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      margin-bottom: 56px;
      animation: fadeIn 1.4s ease forwards;
      opacity: 0;
      animation-delay: 0.6s;
    }

    /* ── VIDEO LIST ── */
    .video-list {
      width: 100%;
      max-width: 760px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .video-card {
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      border: 1px solid rgba(255,255,255,0.07);
      background: #0d0d0d;
      overflow: hidden;
    }

    .card-top {
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-number {
      font-size: 0.7rem;
      font-style: italic;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.14em;
    }

    .card-dots {
      display: flex;
      gap: 5px;
    }

    .card-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      cursor: pointer;
    }

    .video-container video {
      width: 100%;
      display: block;
      max-height: 460px;
      object-fit: contain;
      background: #000;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .play-overlay.hidden { opacity: 0; }

    .play-btn {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      background: rgba(0,0,0,0.25);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .video-container:hover .play-btn {
      transform: scale(1.07);
      border-color: rgba(255,255,255,0.55);
    }

    .play-btn svg {
      width: 16px;
      height: 16px;
      fill: rgba(255,255,255,0.85);
      margin-left: 3px;
    }

    /* loading / error */
    .state-msg {
      text-align: center;
      padding: 60px 0;
      font-style: italic;
      font-size: 1rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.06em;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    /* ── PARA TI FOOTER ── */
    .para-ti {
      margin-top: 80px;
      margin-bottom: 60px;
      text-align: center;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
      animation-delay: 0.4s;
    }

    .para-ti p {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-style: italic;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 560px) {
      .site-title { margin-top: 48px; margin-bottom: 40px; }
      .video-list { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <!-- العنوان فوق -->
  <div class="site-title">
    <h1>Cuídate y mantente bien.&nbsp;🤍</h1>
  </div>

  <div class="divider"></div>

  <!-- الفيديوهات -->
  <div class="video-list" id="container">
    <div class="state-msg">
      <div class="spinner"></div>
      ...
    </div>
  </div>

  <!-- para ti تحت -->
  <div class="para-ti">
    <p>para ti</p>
  </div>

</body>

<script>
  const REPO      = 'modasmadi/Memory';
  const BRANCH    = 'main';
  const VIDEO_EXT = /\.(mp4|mov|webm|mkv)$/i;

  function extractNumber(name) {
    const m = name.match(/(\d+)/);
    return m ? parseInt(m[1], 10) : 0;
  }

  async function load() {
    const container = document.getElementById('container');
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/?ref=${BRANCH}`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      if (!res.ok) throw new Error(res.status);

      const files  = await res.json();
      const videos = files
        .filter(f => f.type === 'file' && VIDEO_EXT.test(f.name))
        .sort((a, b) => extractNumber(a.name) - extractNumber(b.name));

      if (!videos.length) {
        container.innerHTML = '<p class="state-msg">...</p>';
        return;
      }

      container.innerHTML = '';

      videos.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.style.animationDelay = `${0.3 + i * 0.15}s`;

        card.innerHTML = `
          <div class="card-top">
            <span class="card-number">${String(i + 1).padStart(2, '0')}</span>
            <div class="card-dots"><span></span><span></span><span></span></div>
          </div>
          <div class="video-container" id="vc-${i}">
            <video preload="metadata" playsinline id="vid-${i}">
              <source src="${v.download_url}" type="video/mp4" />
            </video>
            <div class="play-overlay" id="overlay-${i}">
              <div class="play-btn">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
          </div>`;

        container.appendChild(card);
      });

      // play logic
      videos.forEach((_, i) => {
        const vc      = document.getElementById(`vc-${i}`);
        const vid     = document.getElementById(`vid-${i}`);
        const overlay = document.getElementById(`overlay-${i}`);

        vc.addEventListener('click', () => {
          if (vid.paused) {
            document.querySelectorAll('video').forEach(v2 => { if (v2 !== vid) v2.pause(); });
            vid.controls = true;
            vid.play();
            overlay.classList.add('hidden');
          } else {
            vid.pause();
            overlay.classList.remove('hidden');
          }
        });

        vid.addEventListener('ended', () => overlay.classList.remove('hidden'));
      });

    } catch (e) {
      console.error(e);
      container.innerHTML = '<p class="state-msg">...</p>';
    }
  }

  load();
</script>

</html>
