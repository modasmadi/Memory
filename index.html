<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuídate y mantente bien.</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TITLE ── */
    .site-title {
      margin-top: 64px;
      margin-bottom: 52px;
      padding: 0 20px;
      text-align: center;
      animation: fadeUp 1.3s ease forwards;
      opacity: 0;
      animation-delay: 0.2s;
    }

    .site-title h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 600;
      font-style: italic;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: 0.01em;
      text-shadow: 0 0 40px rgba(255,255,255,0.08);
    }

    /* ── VIDEO LIST ── */
    .video-list {
      width: 100%;
      max-width: 760px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .video-card {
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      border: 1px solid rgba(255,255,255,0.07);
      background: #000000;
      overflow: hidden;
    }

    .card-top {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-number {
      font-size: 0.68rem;
      font-style: italic;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.14em;
      font-weight: 300;
    }

    .card-dots { display: flex; gap: 5px; }
    .card-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    /* video wrapper */
    .video-container {
      position: relative;
      width: 100%;
      background: #000000;
      cursor: pointer;
    }

    .video-container video {
      width: 100%;
      display: block;
      max-height: 480px;
      object-fit: contain;
      background: #000000;
    }

    /* play overlay */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.28);
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .play-overlay.hidden { opacity: 0; }

    .play-btn {
      width: 54px; height: 54px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      background: rgba(0,0,0,0.3);
      transition: transform 0.22s ease, border-color 0.22s ease;
    }

    .video-container:hover .play-btn {
      transform: scale(1.08);
      border-color: rgba(255,255,255,0.6);
    }

    .play-btn svg {
      width: 16px; height: 16px;
      fill: #ffffff;
      margin-left: 3px;
    }

    /* loading */
    .state-msg {
      text-align: center;
      padding: 60px 0;
      font-style: italic;
      font-size: 1rem;
      color: rgba(255,255,255,0.15);
    }

    .spinner {
      width: 16px; height: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    /* ── PARA TI ── */
    .para-ti {
      margin-top: 72px;
      margin-bottom: 64px;
      padding: 0 20px;
      text-align: center;
    }

    .para-ti p {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 600;
      font-style: italic;
      color: #ffffff;
      letter-spacing: 0.04em;
      text-shadow: 0 0 40px rgba(255,255,255,0.08);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 560px) {
      .site-title { margin-top: 44px; margin-bottom: 36px; }
      .video-list { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <div class="site-title">
    <h1>Cuídate y mantente bien.&nbsp;🤍</h1>
  </div>

  <div class="video-list" id="container">
    <div class="state-msg">
      <div class="spinner"></div>
      ...
    </div>
  </div>

  <div class="para-ti">
    <p>para ti</p>
  </div>

</body>

<script>
  const REPO      = 'modasmadi/Memory';
  const BRANCH    = 'main';
  const VIDEO_EXT = /\.(mp4|mov|webm|mkv)$/i;

  function extractNumber(name) {
    const m = name.match(/(\d+)/);
    return m ? parseInt(m[1], 10) : 0;
  }

  // force browser to render first frame as thumbnail
  function forceThumb(vid) {
    vid.addEventListener('loadedmetadata', () => {
      vid.currentTime = 0.001;
    }, { once: true });
  }

  async function load() {
    const container = document.getElementById('container');
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/?ref=${BRANCH}`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      if (!res.ok) throw new Error(res.status);

      const files  = await res.json();
      const videos = files
        .filter(f => f.type === 'file' && VIDEO_EXT.test(f.name))
        .sort((a, b) => extractNumber(a.name) - extractNumber(b.name));

      if (!videos.length) {
        container.innerHTML = '<p class="state-msg">...</p>';
        return;
      }

      container.innerHTML = '';

      videos.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.style.animationDelay = `${0.3 + i * 0.15}s`;

        card.innerHTML = `
          <div class="card-top">
            <span class="card-number">${String(i + 1).padStart(2, '0')}</span>
            <div class="card-dots"><span></span><span></span><span></span></div>
          </div>
          <div class="video-container" id="vc-${i}">
            <video preload="auto" playsinline id="vid-${i}">
              <source src="${v.download_url}" type="video/mp4" />
            </video>
            <div class="play-overlay" id="overlay-${i}">
              <div class="play-btn">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
          </div>`;

        container.appendChild(card);

        // force thumbnail after DOM insert
        const vid = document.getElementById(`vid-${i}`);
        forceThumb(vid);

        // play logic
        const vc      = document.getElementById(`vc-${i}`);
        const overlay = document.getElementById(`overlay-${i}`);

        vc.addEventListener('click', () => {
          if (vid.paused) {
            document.querySelectorAll('video').forEach(v2 => { if (v2 !== vid) v2.pause(); });
            vid.controls = true;
            vid.play();
            overlay.classList.add('hidden');
          } else {
            vid.pause();
            overlay.classList.remove('hidden');
          }
        });

        vid.addEventListener('ended', () => overlay.classList.remove('hidden'));
      });

    } catch (e) {
      console.error(e);
      container.innerHTML = '<p class="state-msg">...</p>';
    }
  }

  load();
</script>

</html>
