<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-container {
            max-width: 600px;
            width: 100%;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        .message {
            margin-top: 30px;
            font-family: 'Georgia', serif;
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ffffff,
                0 0 20px #ffffff,
                0 0 30px #ffffff,
                0 0 40px #ffffff;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 
                    0 0 10px #ffffff,
                    0 0 20px #ffffff,
                    0 0 30px #ffffff;
            }
            to {
                text-shadow: 
                    0 0 15px #ffffff,
                    0 0 25px #ffffff,
                    0 0 35px #ffffff,
                    0 0 45px #ffffff;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video controls autoplay>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>
    
    <p class="message">Cuídate y mantente bien.🤍</p>
</body>
</html>
