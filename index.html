<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuídate y mantente bien.</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    /* header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 44px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      background: rgba(0,0,0,0.75);
      animation: fadeDown 1.2s ease forwards;
    }

    .site-title {
      font-size: clamp(1rem, 2vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.03em;
      opacity: 0.85;
    }

    /* main */
    main {
      padding-top: 108px;
      padding-bottom: 120px;
      max-width: 820px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }

    /* hero */
    .hero {
      text-align: center;
      padding: 80px 0 80px;
      animation: fadeUp 1.4s ease forwards;
      opacity: 0;
      animation-delay: 0.15s;
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .hero .heart {
      font-style: normal;
      opacity: 0.5;
    }

    .hero-line {
      width: 1px;
      height: 60px;
      background: rgba(255,255,255,0.15);
      margin: 40px auto 0;
    }

    /* states */
    .state-msg {
      text-align: center;
      padding: 70px 0;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.04em;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.35);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 18px;
    }

    /* video list */
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 64px;
    }

    .video-card {
      opacity: 0;
      animation: fadeUp 1s ease forwards;
    }

    /* just the number — nothing else */
    .video-index {
      font-size: 0.72rem;
      font-style: italic;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.14em;
      margin-bottom: 14px;
      text-align: left;
    }

    .video-wrapper {
      width: 100%;
      background: #050505;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .video-wrapper video {
      width: 100%;
      display: block;
      max-height: 520px;
      object-fit: contain;
      background: #000;
    }

    /* footer */
    footer {
      text-align: center;
      padding: 70px 0 24px;
      font-style: italic;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.08);
      letter-spacing: 0.1em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 580px) {
      header { padding: 20px 20px; }
      main { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

<header>
  <span class="site-title">Cuídate y mantente bien.<span class="heart"> ♡</span></span>
</header>

<main>
  <div class="hero">
    <h1>Cuídate y mantente bien.<span class="heart">♡</span></h1>
    <div class="hero-line"></div>
  </div>

  <div id="container">
    <div class="state-msg">
      <div class="spinner"></div>
      ...
    </div>
  </div>

  <footer>para ti · siempre</footer>
</main>

<script>
  const REPO   = 'modasmadi/Memory';
  const BRANCH = 'main';
  const VIDEO_EXT = /\.(mp4|mov|webm|mkv)$/i;

  // ترتيب رقمي — video1 قبل video2 قبل video10
  function extractNumber(name) {
    const match = name.match(/(\d+)/);
    return match ? parseInt(match[1], 10) : 0;
  }

  async function load() {
    const container = document.getElementById('container');

    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/?ref=${BRANCH}`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      if (!res.ok) throw new Error(res.status);

      const files = await res.json();

      const videos = files
        .filter(f => f.type === 'file' && VIDEO_EXT.test(f.name))
        .sort((a, b) => extractNumber(a.name) - extractNumber(b.name));

      if (!videos.length) {
        container.innerHTML = '<p class="state-msg">...</p>';
        return;
      }

      const list = document.createElement('div');
      list.className = 'video-list';

      videos.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.style.animationDelay = `${0.5 + i * 0.2}s`;
        card.innerHTML = `
          <div class="video-index">${String(i + 1).padStart(2, '0')}</div>
          <div class="video-wrapper">
            <video controls preload="metadata" playsinline>
              <source src="${v.download_url}" type="video/mp4" />
            </video>
          </div>`;
        list.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(list);

    } catch (e) {
      console.error(e);
      container.innerHTML = '<p class="state-msg">...</p>';
    }
  }

  load();
</script>

</body>
</html>
